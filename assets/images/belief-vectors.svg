<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" font-family="Georgia, 'EB Garamond', serif">

  <rect width="780" height="520" fill="#FAFAF8"/>

  <text x="155" y="64" text-anchor="middle" font-size="10" fill="#5A8A5A" letter-spacing="0.10em">POSITIVE</text>
  <text x="155" y="456" text-anchor="middle" font-size="10" fill="#B85450" letter-spacing="0.10em">NEGATIVE</text>
  <text x="625" y="64" text-anchor="middle" font-size="10" fill="#5A8A5A" letter-spacing="0.10em">POSITIVE</text>
  <text x="625" y="456" text-anchor="middle" font-size="10" fill="#B85450" letter-spacing="0.10em">NEGATIVE</text>

  <line x1="272" y1="260" x2="195" y2="260" stroke="#C8C0B0" stroke-width="1.5"/>
  <line x1="508" y1="260" x2="585" y2="260" stroke="#C8C0B0" stroke-width="1.5"/>

  <circle cx="390" cy="260" r="52" fill="#F0EDE6" stroke="#C8C0B0" stroke-width="1.5"/>
  <text x="390" y="254" text-anchor="middle" font-size="11" fill="#6B6357" letter-spacing="0.06em">BELIEF</text>
  <text x="390" y="272" text-anchor="middle" font-size="10" fill="#9A9080" font-style="italic">"being capable is good"</text>

  <circle cx="155" cy="260" r="40" fill="#F5F3F0" stroke="#C8C0B0" stroke-width="1.2"/>
  <text x="155" y="254" text-anchor="middle" font-size="10" fill="#6B6357" letter-spacing="0.04em">INTERNAL</text>
  <text x="155" y="269" text-anchor="middle" font-size="10" fill="#9A9080">RESPONSE</text>

  <line x1="136" y1="222" x2="96" y2="138" stroke="#5A8A5A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="96,138 88,158 108,152" fill="#5A8A5A"/>
  <text x="72" y="128" text-anchor="middle" font-size="12" fill="#5A8A5A">Pride</text>

  <line x1="155" y1="220" x2="155" y2="145" stroke="#5A8A5A" stroke-width="2" stroke-linecap="round"/>
  <polygon points="155,145 148,162 162,162" fill="#5A8A5A"/>
  <text x="155" y="134" text-anchor="middle" font-size="12" fill="#5A8A5A">Confidence</text>

  <line x1="174" y1="225" x2="206" y2="163" stroke="#5A8A5A" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="206,163 196,180 212,178" fill="#5A8A5A"/>
